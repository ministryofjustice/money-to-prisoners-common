version: 2
updates:
  - package-ecosystem: pip
    directory: /
    ignore:
      - dependency-name: Django
        versions:
          - '>=3.3'
      - dependency-name: kubernetes
        versions:
          - '>=30'
    groups:
      minor-updates:
        update-types: [minor, patch]
    schedule:
      interval: monthly
    pull-request-branch-name:
      separator: '-'

  - package-ecosystem: npm
    directories:
      - /
      - /mtp_common/templates/mtp_common/build_tasks
    ignore:
      # govuk-frontend 6.x requires Dart Sass; the build uses LibSass. Pin to 5.x
      # until bundle_stylesheets is migrated to Dart Sass.
      - dependency-name: govuk-frontend
        versions:
          - '>=6'
      # jquery 4.x is ESM-only: webpack's ProvidePlugin binds `$` to the module
      # namespace object (not the function) so `$(...)` throws `$ is not a function`,
      # and 4.0 removed APIs still used across the apps ($.proxy, $.isArray, $.trim,
      # .size()). Pin to 3.x until the ProvidePlugin config and those call sites are
      # migrated. See IR-1755.
      - dependency-name: jquery
        versions:
          - '>=4'
    groups:
      minor-updates:
        update-types: [minor, patch]
    schedule:
      interval: monthly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    pull-request-branch-name:
      separator: '-'
